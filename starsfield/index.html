<!doctype html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Starfield</title>
	<style>
		html,
		body {
			height: 100%;
			margin: 0
		}

		#stage {
			position: relative;
			height: 100%;
			width: 100%;
			overflow: hidden
		}

		canvas {
			display: block
		}

		#stars {
			position: absolute;
			inset: 0;
			z-index: 0
		}
	</style>
</head>

<body>
	<div id="stage"> <canvas id="stars"></canvas> </div>
	<!-- load as a normal script so file:// access works in browsers -->
	<script src="starfield.js"></script>
</body>

</html>
